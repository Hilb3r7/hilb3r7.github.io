---
layout: default
title: walkthroughs
description: "Walkthroughs for various CTFs"
---

<div class="container">
    <section class="section">
        <div class="columns is-multiline">
            <div class="column is-12">
                <div class="content">
                    <p>Here are walkthroughs I have written for various CTFs</p>
                </div>
            </div>
            {% for item in site.walkthroughs %}
			<div class="column is-4">
                <div class="card">
                    <div class="card-image">
                        <img src="{{ item.logo }}" alt="{{ item.title }}" />
                    </div>
                    <div class="card-content">
                            <p class="title is-5">{{ item.title }}</p>
                        <div class="content">
                            <p>{{ item.description }}</p>
                        </div>
                    </div>
                    <footer class="card-footer">
                        <p class="card-footer-item">
                        <span>
                            <a href="{{ item.url }}" class="button is-info">Read</a>
                        </span>
                        </p>
                    </footer>
                </div>

            </div>
            {% endfor %}
        </div>
    </section>
</div>
